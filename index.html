.dash-table td { font-size: 9pt; letter-spacing: 0.05em; color: #1a1a1a; padding: 12px 10px; border-bottom: 0.4px solid #e8e8e8; vertical-align: middle; }
.dash-table td:not(:first-child) { text-align: center; }
.dash-table tr:last-child td { border-bottom: none; }
.dash-table tr:hover td { background: #f9f9f9; }
.address-cell { font-weight: bold; text-transform: uppercase; font-size: 8pt; letter-spacing: 0.08em; }
.metric-val { font-size: 14pt; font-weight: bold; color: #1c3668; line-height: 1; display: block; }
.metric-lbl { font-size: 6pt; letter-spacing: 0.1em; color: #aaa; text-transform: uppercase; display: block; margin-top: 2px; }
.report-link { font-size: 7pt; letter-spacing: 0.12em; color: #1c3668; text-transform: uppercase; text-decoration: none; border-bottom: 0.5px solid #1c3668; padding-bottom: 1px; }

.total-row td { border-top: 0.6px solid #1a1a1a; border-bottom: none; padding-top: 14px; }
.total-row .metric-val { color: #888; font-size: 12pt; }

.footer-rule { width: calc(100% - 40px); height: 0.6px; background: #1a1a1a; margin-top: 24px; }

function base64url(str) { return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
function base64urlUint8(b) { let s=''; b.forEach(x=>s+=String.fromCharCode(x)); return base64url(s); }

async function getToken() {
  const h={alg:'RS256',typ:'JWT'}, now=Math.floor(Date.now()/1000);
  const c={iss:SA_EMAIL,scope:'https://www.googleapis.com/auth/analytics.readonly',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now};
  const toSign=base64url(JSON.stringify(h))+'.'+base64url(JSON.stringify(c));
  const pem=SA_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const der=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const key=await crypto.subtle.importKey('pkcs8',der.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(toSign));
  const jwt=toSign+'.'+base64urlUint8(new Uint8Array(sig));
  const r=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  return (await r.json()).access_token;
}

async function fetchListing(token, listing, startDate, endDate) {
  const url = `https://analyticsdata.googleapis.com/v1beta/properties/${GA4_PROPERTY_ID}:runReport`;
  const h = {'Authorization':'Bearer '+token,'Content-Type':'application/json'};
  const f = {filter:{fieldName:'pagePath',stringFilter:{matchType:'CONTAINS',value:listing.path}}};
  const resp = await fetch(url, {
    method:'POST', headers:h,
    body: JSON.stringify({
      dateRanges:[{startDate,endDate}],
      metrics:[{name:'screenPageViews'},{name:'activeUsers'}],
      dimensionFilter:f
    })
  });
  const data = await resp.json();
  const row = data.rows?.[0]?.metricValues || [{value:'0'},{value:'0'}];
  return {
    views: parseInt(row[0].value),
    users: parseInt(row[1].value)
  };
}

function fmtDisplay(s) {
  const d=new Date(s+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

async function init() {
  const end = new Date();
  const start = new Date();
  start.setDate(start.getDate()-30);
  const startDate = start.toISOString().split('T')[0];
  const endDate = end.toISOString().split('T')[0];

  document.getElementById('date-line').textContent =
    'Last 30 days · ' + fmtDisplay(startDate) + ' – ' + fmtDisplay(endDate);

  try {
    const token = await getToken();

    // Fetch all listings in parallel
    const results = await Promise.all(
      LISTINGS.map(l => fetchListing(token, l, startDate, endDate))
    );

    const totalViews = results.reduce((s,r)=>s+r.views,0);
    const totalUsers = results.reduce((s,r)=>s+r.users,0);

    let rows = LISTINGS.map((l,i) => `
      <tr>
        <td class="address-cell">${l.address}</td>
        <td><span class="metric-val">${results[i].views.toLocaleString()}</span><span class="metric-lbl">Views</span></td>
        <td><span class="metric-val">${results[i].users.toLocaleString()}</span><span class="metric-lbl">Visitors</span></td>
        <td><a class="report-link" href="${l.report}" target="_blank">Full Report →</a></td>
      </tr>`).join('');

    document.getElementById('table-wrap').innerHTML = `
      <table class="dash-table">
        <thead>
          <tr>
            <th>Property</th>
            <th>Total Views</th>
            <th>Unique Visitors</th>
            <th>Report</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
          <tr class="total-row">
            <td class="address-cell" style="color:#888">All Active Listings</td>
            <td><span class="metric-val">${totalViews.toLocaleString()}</span><span class="metric-lbl">Total Views</span></td>
            <td><span class="metric-val">${totalUsers.toLocaleString()}</span><span class="metric-lbl">Total Visitors</span></td>
            <td></td>
          </tr>
        </tbody>
      </table>`;

    document.getElementById('refresh-note').textContent =
      'Loaded ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

  } catch(e) {
    document.getElementById('table-wrap').innerHTML =
      '<div class="loading" style="color:#c00">Error loading data: ' + e.message + '</div>';
  }
}

window.addEventListener('load', init);
